<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Bridge Game - With Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a, #2d5a27, #1e3a1e);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Menu Styles */
        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            color: white;
        }
        
        .menu-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .menu-screen p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .menu-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .menu-btn {
            padding: 20px 40px;
            font-size: 1.3rem;
            background: white;
            color: #1a472a;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        
        /* Game Screen */
        .game-screen {
            display: none;
        }
        
        /* Game Table */
        .game-table {
            background: #0d260d;
            border-radius: 50%;
            width: 750px;
            height: 750px;
            margin: 40px auto;
            position: relative;
            box-shadow: 0 25px 75px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.4);
            border: 8px solid #0a1f0a;
        }
        
        .player-area {
            position: absolute;
            width: 180px;
            text-align: center;
            color: white;
        }
        
        .player-area.north {
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .player-area.east {
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .player-area.south {
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .player-area.west {
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .player-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        
        .player-name.human {
            background: rgba(255,215,0,0.5);
            border: 2px solid #ffd700;
            color: #000;
        }
        
        .player-name.current {
            animation: pulse 1.2s infinite;
            border-color: #ffeb3b;
            box-shadow: 0 0 20px rgba(255,235,59,0.4);
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,235,59,0.6); }
            50% { box-shadow: 0 0 0 12px rgba(255,235,59,0.1); }
        }
        
        /* Cards */
        .hand {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            position: relative;
            height: 70px;
        }
        
        .card {
            position: absolute;
            width: 48px;
            height: 68px;
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 1px 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 1px 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        .card.red {
            color: #dc143c;
        }
        
        .card.black {
            color: #000;
        }
        
        .card-back {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: transparent;
            border: 1px solid #444;
        }
        
        /* Info Panel */
        .info-panel {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            max-width: 380px;
            position: fixed;
            right: 20px;
            top: 20px;
        }
        
        .info-panel h2 {
            color: #1a472a;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .trick-score {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        /* Bidding */
        .bidding-history {
            background: #f0f8f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #c8e6c9;
        }
        
        .bid {
            display: inline-block;
            padding: 6px 10px;
            background: white;
            border-radius: 6px;
            margin: 3px;
            border: 1px solid #ddd;
            font-size: 0.95rem;
            font-weight: 600;
        }
        
        .bid.red {
            color: #dc143c;
            border-color: #dc143c;
            background: #ffebee;
        }
        
        .bid.green {
            color: #2e7d32;
            border-color: #2e7d32;
            background: #e8f5e9;
        }
        
        .bid.normal {
            color: #1565c0;
            border-color: #1565c0;
            background: #e3f2fd;
        }
        
        /* Controls */
        .controls {
            margin-top: 15px;
            text-align: center;
        }
        
        .action-btn {
            padding: 12px 24px;
            margin: 5px;
            background: #1a472a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .action-btn:hover {
            background: #2d5a27;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        
        /* Bidding Panel */
        .bidding-panel {
            display: none;
            background: rgba(255,255,255,0.98);
            padding: 25px;
            border-radius: 18px;
            margin-top: 20px;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .bidding-panel h3 {
            color: #1a472a;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.4rem;
        }
        
        .bidding-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }
        
        .bid-btn {
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #1565c0;
            background: white;
            color: #1565c0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .bid-btn:hover {
            background: #1565c0;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(21,101,192,0.3);
        }
        
        .bid-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            border-color: #ccc;
            color: #999;
        }
        
        .bid-btn:disabled:hover {
            background: white;
            color: #999;
        }
        
        .special-bids {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .special-bids .bid-btn {
            background: #f5f5f5;
            border-color: #757575;
            color: #424242;
        }
        
        .special-bids .bid-btn.pass {
            background: #e8f5e9;
            border-color: #2e7d32;
            color: #2e7d32;
        }
        
        .special-bids .bid-btn.double {
            background: #ffebee;
            border-color: #dc143c;
            color: #dc143c;
        }
        
        .special-bids .bid-btn.redouble {
            background: #ffeb3b;
            border-color: #f9a825;
            color: #f57f17;
        }
        
        .special-bids .bid-btn:hover {
            background: #e0e0e0;
            color: #000;
        }
        
        .special-bids .bid-btn.pass:hover {
            background: #2e7d32;
            color: white;
        }
        
        .special-bids .bid-btn.double:hover {
            background: #dc143c;
            color: white;
        }
        
        .special-bids .bid-btn.redouble:hover {
            background: #f57f17;
            color: white;
        }
        
        /* Error Message */
        .error-message {
            background: #ffebee;
            color: #dc143c;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #dc143c;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* Vulnerability */
        .vul-info {
            margin-bottom: 15px;
            padding: 10px;
            background: #fff3e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        
        .vul {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 2px;
            font-weight: 600;
        }
        
        .vul.ns-vul {
            background: #ffebee;
            color: #dc143c;
        }
        
        .vul.ns-nonvul {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .vul.ew-vul {
            background: #ffebee;
            color: #dc143c;
        }
        
        .vul.ew-nonvul {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Menu Screen -->
        <div class="menu-screen" id="menuScreen">
            <h1>🃏 Bridge Game (Improved)</h1>
            <p>Play bridge with bid validation and colored bids!</p>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="startGame('4ai')">
                    🤖 4 AI Players (Watch)
                </button>
                <button class="menu-btn" onclick="startGame('3ai1human')">
                    🧑‍🤝‍🤖 3 AI + 1 Human
                </button>
            </div>
        </div>
        
        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen">
            <!-- Game Table -->
            <div class="game-table">
                <div class="player-area north">
                    <div class="player-name" id="northName">North</div>
                    <div class="hand" id="northHand"></div>
                </div>
                
                <div class="player-area east">
                    <div class="player-name" id="eastName">East</div>
                    <div class="hand" id="eastHand"></div>
                </div>
                
                <div class="player-area south">
                    <div class="player-name" id="southName">South</div>
                    <div class="hand" id="southHand"></div>
                </div>
                
                <div class="player-area west">
                    <div class="player-name" id="westName">West</div>
                    <div class="hand" id="westHand"></div>
                </div>
            </div>
            
            <!-- Info Panel -->
            <div class="info-panel">
                <h2>🎮 Game Info</h2>
                
                <div class="vul-info" id="vulInfo">
                    <strong>Vulnerability:</strong>
                </div>
                
                <div class="trick-score">
                    <span>NS: <span id="nsTricks">0</span></span>
                    <span>EW: <span id="ewTricks">0</span></span>
                </div>
                
                <div id="biddingInfo">
                    <h3>📢 Bidding</h3>
                    <div class="bidding-history" id="biddingHistory"></div>
                </div>
                
                <div class="controls">
                    <button class="action-btn" onclick="aiBid()" id="aiBidBtn">
                        🤖 AI Bid
                    </button>
                    <button class="action-btn" onclick="goToMenu()">
                        🏠 Main Menu
                    </button>
                </div>
                
                <div class="error-message" id="errorMessage"></div>
            </div>
            
            <!-- Bidding Panel -->
            <div class="bidding-panel" id="biddingPanel">
                <h3>🎯 Your Turn to Bid</h3>
                <div class="bidding-grid" id="biddingGrid"></div>
                <div class="special-bids">
                    <button class="bid-btn pass" onclick="makeBid('Pass')">Pass</button>
                    <button class="bid-btn double" onclick="makeBid('Double')">Double</button>
                    <button class="bid-btn redouble" onclick="makeBid('Redouble')">Redouble</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let gameState = null;
        let humanPlayer = null;
        
        const playerNames = ['North', 'East', 'South', 'West'];
        const suits = ['C', 'D', 'H', 'S', 'NT'];
        
        async function startGame(mode) {
            const response = await fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: mode })
            });
            
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('menuScreen').style.display = 'none';
                document.getElementById('gameScreen').style.display = 'block';
                humanPlayer = result.state.human_player;
                
                // Mark human player
                if (humanPlayer !== null) {
                    const players = ['northName', 'eastName', 'southName', 'westName'];
                    document.getElementById(players[humanPlayer]).classList.add('human');
                }
                
                updateGame(result.state);
                
                // If all AI, start auto-play
                if (mode === '4ai') {
                    autoPlay();
                }
            }
        }
        
        async function updateGame(state) {
            if (!state) return;
            
            // Update trick count
            document.getElementById('nsTricks').textContent = state.tricks_ns;
            document.getElementById('ewTricks').textContent = state.tricks_ew;
            
            // Update vulnerability
            const vulInfo = document.getElementById('vulInfo');
            vulInfo.innerHTML = `<strong>Vulnerability:</strong> ` +
                `<span class="vul ${state.vul.ns ? 'ns-vul' : 'ns-nonvul'}">NS: ${state.vul.ns ? 'Vul' : 'Non-Vul'}</span>` +
                `<span class="vul ${state.vul.ew ? 'ew-vul' : 'ew-nonvul'}">EW: ${state.vul.ew ? 'Vul' : 'Non-Vul'}</span>`;
            
            // Update bidding with colors
            const biddingDiv = document.getElementById('biddingHistory');
            biddingDiv.innerHTML = state.bidding.map(b => {
                const color = b.color || 'normal';
                return `<span class="bid ${color}">${b.bid}</span>`;
            }).join('');
            
            // Highlight current player
            ['northName', 'eastName', 'southName', 'westName'].forEach(id => {
                document.getElementById(id).classList.remove('current');
            });
            document.getElementById(['northName', 'eastName', 'southName', 'westName'][state.current_player]).classList.add('current');
            
            // Update hands
            updateHands(state.hands);
            
            // Check if human's turn
            if (humanPlayer !== null && state.current_player === humanPlayer && state.phase === 'bidding') {
                document.getElementById('aiBidBtn').style.display = 'none';
                showBiddingPanel();
            } else {
                document.getElementById('aiBidBtn').style.display = 'inline-block';
                document.getElementById('biddingPanel').style.display = 'none';
            }
        }
        
        function updateHands(hands) {
            const playerAreas = ['northHand', 'eastHand', 'southHand', 'westHand'];
            
            playerAreas.forEach((handId, i) => {
                const player = playerNames[i].toLowerCase();
                const hand = hands[player] || [];
                const handDiv = document.getElementById(handId);
                
                // Human player sees their own cards, others see backs
                const isHuman = i === humanPlayer;
                
                const cardOffset = 12; // px between cards
                const totalWidth = (hand.length - 1) * cardOffset + 48;
                const startX = -totalWidth / 2;
                
                handDiv.innerHTML = hand.map((card, idx) => {
                    const x = startX + idx * cardOffset;
                    if (isHuman) {
                        const isRed = card.includes('♥') || card.includes('♦');
                        return `<div class="card ${isRed ? 'red' : 'black'}" 
                                    style="left: 50%; top: 50%; 
                                           transform: translate(calc(-50% + ${x}px), -50%);
                                           z-index: ${idx};">${card}</div>`;
                    } else {
                        return `<div class="card card-back" 
                                    style="left: 50%; top: 50%; 
                                           transform: translate(calc(-50% + ${x}px), -50%);
                                           z-index: ${idx};">?</div>`;
                    }
                }).join('');
            });
        }
        
        async function showBiddingPanel() {
            const panel = document.getElementById('biddingPanel');
            panel.style.display = 'block';
            
            // Generate bidding options
            const grid = document.getElementById('biddingGrid');
            grid.innerHTML = '';
            
            // Check which bids are valid
            for (let level = 1; level <= 7; level++) {
                for (let i = 0; i < suits.length; i++) {
                    const suit = suits[i];
                    const bidText = `${level}${suit}`;
                    const btn = document.createElement('button');
                    btn.className = 'bid-btn';
                    btn.textContent = bidText;
                    btn.onclick = () => makeBid(bidText);
                    
                    // Validate bid
                    const validResponse = await fetch('/api/validate_bid', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ bid: bidText })
                    });
                    
                    const validResult = await validResponse.json();
                    if (!validResult.valid) {
                        btn.disabled = true;
                    }
                    
                    grid.appendChild(btn);
                }
            }
            
            // Also validate special bids
            const specialBtns = document.querySelectorAll('.special-bids .bid-btn');
            for (let btn of specialBtns) {
                const bidText = btn.textContent;
                const validResponse = await fetch('/api/validate_bid', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bid: bidText })
                });
                
                const validResult = await validResponse.json();
                if (!validResult.valid) {
                    btn.disabled = true;
                } else {
                    btn.disabled = false;
                }
            }
        }
        
        async function makeBid(bid) {
            const response = await fetch('/api/bid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bid: bid })
            });
            
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('biddingPanel').style.display = 'none';
                document.getElementById('errorMessage').classList.remove('show');
                updateGame(result.state);
                autoPlay();
            } else {
                // Show error
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = result.error || 'Invalid bid!';
                errorDiv.classList.add('show');
            }
        }
        
        async function aiBid() {
            const response = await fetch('/api/ai_bid');
            const result = await response.json();
            
            if (result.success) {
                updateGame(result.state);
            }
        }
        
        async function autoPlay() {
            while (true) {
                await new Promise(r => setTimeout(r, 800));
                
                const stateResp = await fetch('/api/state');
                const stateData = await stateResp.json();
                
                if (!stateData.state) break;
                if (stateData.state.phase !== 'bidding') break;
                
                if (humanPlayer !== null && stateData.state.current_player === humanPlayer) {
                    break;
                }
                
                const response = await fetch('/api/ai_bid');
                const result = await response.json();
                
                if (!result.success) break;
                
                updateGame(result.state);
            }
        }
        
        function goToMenu() {
            document.getElementById('menuScreen').style.display = 'flex';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('biddingPanel').style.display = 'none';
            document.getElementById('errorMessage').classList.remove('show');
        }
    </script>
</body>
</html>
